services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vnzl
      POSTGRES_PASSWORD: vnzl
      POSTGRES_DB: insumos
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vnzl -d insumos"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

volumes:
  pgdata:
